name: Run Merval Bot Horarios Exactos

on:
  schedule:
    # 1. Alerta de apertura a las 10:50 AM Arg (13:50 UTC)
    - cron: '50 13 * * 1-5'
    
    # 2. Primera alerta del mercado 11:05 AM Arg (14:05 UTC)
    - cron: '5 14 * * 1-5'
    
    # 3. Alertas de las 12, 13, 14, 15, 16 y 17 hs Arg (15, 16, 17, 18, 19, 20 UTC)
    - cron: '0 15,16,17,18,19,20 * * 1-5'
    
  workflow_dispatch: # Botón manual para pruebas

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install yfinance requests pytz

      - name: Ejecutar Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_merval.py
