name: Run Merval Bot

on:
  workflow_dispatch:
  schedule:
    # Horarios en UTC (Argentina = UTC-3)
    - cron: '25 22 * * 1-5'  # 19:25 AR → 22:25 UTC
    - cron: '0 14 * * 1-5'   # 11:00 AR
    - cron: '0 15 * * 1-5'   # 12:00 AR
    - cron: '0 16 * * 1-5'   # 13:00 AR
    - cron: '0 17 * * 1-5'   # 14:00 AR
    - cron: '0 18 * * 1-5'   # 15:00 AR
    - cron: '0 19 * * 1-5'   # 16:00 AR
    - cron: '0 20 * * 1-5'   # 17:00 AR
    - cron: '0 21 * * 1-5'   # 18:00 AR

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install yfinance requests pytz pandas

      - name: Ejecutar Script Merval
        env:
          TOKEN_BOT: ${{ secrets.TOKEN_BOT }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot_merval.py
