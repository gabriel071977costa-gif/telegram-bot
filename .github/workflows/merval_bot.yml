name: Run Merval Bot

on:
  workflow_dispatch:
  schedule:
    # Apertura: 10:45–10:55 AR → 13:45–13:55 UTC
    - cron: '45 13 * * 1-5'
    - cron: '50 13 * * 1-5'
    - cron: '55 13 * * 1-5'

    # Alertas horarias: cada hora de 11 a 17 AR → 14 a 20 UTC
    - cron: '0 14 * * 1-5'
    - cron: '0 15 * * 1-5'
    - cron: '0 16 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '0 18 * * 1-5'
    - cron: '0 19 * * 1-5'
    - cron: '0 20 * * 1-5'


jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install requests pytz yfinance

      - name: Ejecutar Script Merval
        env:
          TOKEN_BOT: ${{ secrets.TOKEN_BOT }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot_merval.py
